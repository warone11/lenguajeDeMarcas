<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <title>Ejercicios CSS</title>
 <link rel="stylesheet" href="estilos.css">
 <style>
    
    *{
        font-family: Arial;
        font-size: 16px;


    }
    #titulo-principal{
        color:blue;
    }
    body{
        background-color: azure;

    }
    h1{
        text-align: center;
    }

    *.intro{
        color:lightgray;
    }




 </style>
</head>
<body>
 <h1 id="titulo-principal">Curso de CSS</h1>
 <p class="intro">Este es un texto introductorio.</p>
 <div class="contenedor">
 <p class="texto">Primer párrafo</p>
 <p class="texto destacado">Segundo párrafo</p>
 <span>Texto dentro de span</span>
 </div>
 <ul id="lista">
 <li class="item">Elemento 1</li>
 <li class="item especial">Elemento 2</li>
 <li class="item">Elemento 3</li>
 </ul>
 <a href="#">Enlace de ejemplo</a>
</body>
</html>
